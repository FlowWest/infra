name: Sync GitHub Issue → monday.com (reusable)

on:
  workflow_call:
    inputs:
      issue_url:
        description: "HTML URL of the GitHub issue"
        required: true
        type: string
      event_action:
        description: "issues event action: closed | reopened | labeled | unlabeled | assigned | unassigned"
        required: true
        type: string
      label_name:
        description: "Label name for labeled/unlabeled events (empty string otherwise)"
        required: false
        type: string
        default: ""
      assignee_login:
        description: "GitHub username of the assignee for assigned/unassigned events"
        required: false
        type: string
        default: ""
      board_id:
        description: "monday board ID for main items"
        required: true
        type: string
      item_link_col:
        description: "Column ID of the GitHub Issue link column on items"
        required: true
        type: string
      item_status_col:
        description: "Column ID of the Status column on items"
        required: true
        type: string
      item_owner_col:
        description: "Column ID of the Owner column on items"
        required: true
        type: string
      subitem_board_id:
        description: "monday board ID for subitems"
        required: true
        type: string
      subitem_link_col:
        description: "Column ID of the GitHub Issue link column on subitems"
        required: true
        type: string
      subitem_status_col:
        description: "Column ID of the Status column on subitems"
        required: true
        type: string
      subitem_owner_col:
        description: "Column ID of the Owner column on subitems"
        required: true
        type: string
    secrets:
      MONDAY_API_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  sync-to-monday:
    runs-on: ubuntu-latest

    env:
      ITEM_BOARD_ID:      ${{ inputs.board_id }}
      ITEM_LINK_COL:      ${{ inputs.item_link_col }}
      ITEM_STATUS_COL:    ${{ inputs.item_status_col }}
      ITEM_OWNER_COL:     ${{ inputs.item_owner_col }}
      SUBITEM_BOARD_ID:   ${{ inputs.subitem_board_id }}
      SUBITEM_LINK_COL:   ${{ inputs.subitem_link_col }}
      SUBITEM_STATUS_COL: ${{ inputs.subitem_status_col }}
      SUBITEM_OWNER_COL:  ${{ inputs.subitem_owner_col }}

    steps:
      - name: Resolve target status
        id: status
        env:
          EVENT_ACTION: ${{ inputs.event_action }}
          LABEL_NAME:   ${{ inputs.label_name }}
        run: |
          echo "Action: $EVENT_ACTION | Label: $LABEL_NAME"
          case "$EVENT_ACTION" in
            closed)
              echo "index=1" >> "$GITHUB_OUTPUT"
              ;;
            reopened)
              echo "index=0" >> "$GITHUB_OUTPUT"
              ;;
            labeled)
              if [ "$LABEL_NAME" = "blocked" ]; then
                echo "index=2" >> "$GITHUB_OUTPUT"
              else
                echo "index=skip" >> "$GITHUB_OUTPUT"
                echo "Label '$LABEL_NAME' does not trigger a status change — skipping."
              fi
              ;;
            unlabeled)
              if [ "$LABEL_NAME" = "blocked" ]; then
                echo "index=0" >> "$GITHUB_OUTPUT"
              else
                echo "index=skip" >> "$GITHUB_OUTPUT"
                echo "Label '$LABEL_NAME' does not trigger a status change — skipping."
              fi
              ;;
            *)
              echo "index=skip" >> "$GITHUB_OUTPUT"
              echo "Action '$EVENT_ACTION' does not trigger a status change — skipping."
              ;;
          esac

      - name: Update monday status
        if: steps.status.outputs.index != 'skip'
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          ISSUE_URL:        ${{ inputs.issue_url }}
          STATUS_INDEX:     ${{ steps.status.outputs.index }}
          EVENT_ACTION:     ${{ inputs.event_action }}
        run: |
          python3 << 'PYEOF'
          import os, json, sys
          import urllib.request, urllib.error

          TOKEN        = os.environ["MONDAY_API_TOKEN"]
          ISSUE_URL    = os.environ["ISSUE_URL"]
          STATUS_INDEX = int(os.environ["STATUS_INDEX"])
          EVENT_ACTION = os.environ["EVENT_ACTION"]

          BOARDS = [
              (os.environ["ITEM_BOARD_ID"],    os.environ["ITEM_LINK_COL"],    os.environ["ITEM_STATUS_COL"],    "items"),
              (os.environ["SUBITEM_BOARD_ID"], os.environ["SUBITEM_LINK_COL"], os.environ["SUBITEM_STATUS_COL"], "subitems"),
          ]

          STATUS_LABELS = {0: "In Progress", 1: "Done", 2: "Stuck"}
          print(f"Issue : {ISSUE_URL}")
          print(f"Action: {EVENT_ACTION} → Status '{STATUS_LABELS.get(STATUS_INDEX, STATUS_INDEX)}'")

          ENDPOINT = "https://api.monday.com/v2"
          HEADERS  = {
              "Content-Type": "application/json",
              "Authorization": TOKEN,
              "API-Version": "2024-10",
          }
          TIMEOUT = 30

          def gql(query, variables=None):
              payload = json.dumps({"query": query, "variables": variables or {}}).encode()
              req = urllib.request.Request(ENDPOINT, data=payload, headers=HEADERS, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=TIMEOUT) as r:
                      raw = r.read()
              except urllib.error.HTTPError as e:
                  print(f"Error: monday API returned HTTP {e.code}: {e.read().decode()}", file=sys.stderr)
                  sys.exit(1)
              except urllib.error.URLError as e:
                  print(f"Error: could not reach monday API: {e.reason}", file=sys.stderr)
                  sys.exit(1)
              except TimeoutError:
                  print(f"Error: monday API request timed out after {TIMEOUT}s", file=sys.stderr)
                  sys.exit(1)
              try:
                  result = json.loads(raw)
              except json.JSONDecodeError as e:
                  print(f"Error: monday API returned malformed JSON: {e}", file=sys.stderr)
                  print(f"       Raw response: {raw[:200]}", file=sys.stderr)
                  sys.exit(1)
              if "errors" in result:
                  print(f"Error: monday API returned GraphQL errors: {result['errors']}", file=sys.stderr)
                  print(f"       Query variables: {variables}", file=sys.stderr)
                  sys.exit(1)
              return result

          ALL_ITEMS_QUERY = """
          query ($boardId: ID!, $linkColId: String!, $cursor: String) {
            boards(ids: [$boardId]) {
              items_page(limit: 100, cursor: $cursor) {
                cursor
                items {
                  id
                  name
                  column_values(ids: [$linkColId]) { text }
                }
              }
            }
          }
          """

          UPDATE_MUTATION = """
          mutation ($itemId: ID!, $boardId: ID!, $colId: String!, $val: JSON!) {
            change_column_value(
              item_id: $itemId board_id: $boardId column_id: $colId value: $val
            ) { id }
          }
          """

          import re

          def find_items_for_url(board_id, link_col, issue_url):
              matched = []
              cursor = None
              while True:
                  variables = {"boardId": board_id, "linkColId": link_col}
                  if cursor:
                      variables["cursor"] = cursor
                  result = gql(ALL_ITEMS_QUERY, variables)
                  page = result.get("data", {}).get("boards", [{}])[0].get("items_page", {})
                  for item in page.get("items", []):
                      col_vals = item.get("column_values", [])
                      link_text = col_vals[0].get("text", "") if col_vals else ""
                      urls = re.findall(r'https?://\S+', link_text)
                      if any(u.rstrip('/').lower() == issue_url.lower() for u in urls):
                          matched.append(item)
                  cursor = page.get("cursor")
                  if not cursor:
                      break
              return matched

          status_value = json.dumps({"index": STATUS_INDEX})
          issue_url = ISSUE_URL.rstrip('/')
          updated = 0

          for board_id, link_col, status_col, label in BOARDS:
              print(f"[{label}] Searching board {board_id} for issue URL...")
              items = find_items_for_url(board_id, link_col, issue_url)
              if not items:
                  print(f"[{label}] No items matched — either the URL hasn't been pasted into the GitHub Issue column, or the column ID is wrong (column ID used: {link_col})")
                  continue
              for item in items:
                  gql(UPDATE_MUTATION, {"itemId": item["id"], "boardId": board_id, "colId": status_col, "val": status_value})
                  print(f"[{label}] ✓ '{item['name']}' (id={item['id']}) → status '{STATUS_LABELS.get(STATUS_INDEX, STATUS_INDEX)}'")
                  updated += 1

          if updated == 0:
              print("Warning: no monday records were updated. Check that issue URLs are correctly pasted into the GitHub Issue link column.")
          else:
              print(f"Done — {updated} record(s) updated.")
          PYEOF

      - name: Update monday owner
        if: inputs.event_action == 'assigned' || inputs.event_action == 'unassigned'
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          GITHUB_TOKEN:     ${{ github.token }}
          ISSUE_URL:        ${{ inputs.issue_url }}
          EVENT_ACTION:     ${{ inputs.event_action }}
        run: |
          python3 << 'PYEOF'
          import os, json, sys, re
          import urllib.request, urllib.error

          TOKEN        = os.environ["MONDAY_API_TOKEN"]
          GITHUB_TOKEN = os.environ["GITHUB_TOKEN"]
          ISSUE_URL    = os.environ["ISSUE_URL"]
          EVENT_ACTION = os.environ["EVENT_ACTION"]

          BOARDS = [
              (os.environ["ITEM_BOARD_ID"],    os.environ["ITEM_LINK_COL"],    os.environ["ITEM_OWNER_COL"],    "items"),
              (os.environ["SUBITEM_BOARD_ID"], os.environ["SUBITEM_LINK_COL"], os.environ["SUBITEM_OWNER_COL"], "subitems"),
          ]

          print(f"Issue : {ISSUE_URL}")
          print(f"Action: {EVENT_ACTION}")

          # FlowWest team: GitHub login → monday display name.
          # Update this when team members join or leave.
          USER_MAP = {
              "thesadie":       "Sadie Gill",
              "ergz":           "Emanuel Rodriguez",
              "alvizek":        "Ashley Vizek",
              "B-yunes":        "Badhia Yunes Katz",
              "catarfish":      "Catarina Pien",
              "ctennerFW":      "Cameron Tenner",
              "ErinCain":       "Erin Cain",
              "InigoP":         "Inigo Peng",
              "JordanHoang":    "Jordan Hoang",
              "liz-fw":         "Liz Stebbins",
              "MaddeeRubenson": "Maddee Rubenson",
              "skylerlewis":    "Skyler Lewis",
              "wdwiii":         "Willie Whitfield",
          }

          TIMEOUT = 30

          # ── Fetch current assignees from GitHub ──────────────────────────
          # Parse repo + issue number from the issue URL
          m = re.match(r'https://github\.com/([^/]+/[^/]+)/issues/(\d+)', ISSUE_URL)
          if not m:
              print(f"Error: could not parse repo/issue from URL: {ISSUE_URL}", file=sys.stderr)
              sys.exit(1)
          repo, issue_number = m.group(1), m.group(2)

          api_url = f"https://api.github.com/repos/{repo}/issues/{issue_number}"
          req = urllib.request.Request(api_url, headers={
              "Authorization": f"Bearer {GITHUB_TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          })
          try:
              with urllib.request.urlopen(req, timeout=TIMEOUT) as r:
                  issue_data = json.loads(r.read())
          except urllib.error.HTTPError as e:
              print(f"Error: GitHub API returned HTTP {e.code}: {e.read().decode()}", file=sys.stderr)
              sys.exit(1)
          except urllib.error.URLError as e:
              print(f"Error: could not reach GitHub API: {e.reason}", file=sys.stderr)
              sys.exit(1)

          current_assignees = [a["login"] for a in issue_data.get("assignees", [])]
          print(f"Current assignees: {current_assignees or '(none)'}")

          ENDPOINT = "https://api.monday.com/v2"
          HEADERS  = {
              "Content-Type": "application/json",
              "Authorization": TOKEN,
              "API-Version": "2024-10",
          }

          def gql(query, variables=None):
              payload = json.dumps({"query": query, "variables": variables or {}}).encode()
              req = urllib.request.Request(ENDPOINT, data=payload, headers=HEADERS, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=TIMEOUT) as r:
                      raw = r.read()
              except urllib.error.HTTPError as e:
                  print(f"Error: monday API returned HTTP {e.code}: {e.read().decode()}", file=sys.stderr)
                  sys.exit(1)
              except urllib.error.URLError as e:
                  print(f"Error: could not reach monday API: {e.reason}", file=sys.stderr)
                  sys.exit(1)
              except TimeoutError:
                  print(f"Error: monday API request timed out after {TIMEOUT}s", file=sys.stderr)
                  sys.exit(1)
              try:
                  result = json.loads(raw)
              except json.JSONDecodeError as e:
                  print(f"Error: monday API returned malformed JSON: {e}", file=sys.stderr)
                  print(f"       Raw response: {raw[:200]}", file=sys.stderr)
                  sys.exit(1)
              if "errors" in result:
                  print(f"Error: monday API returned GraphQL errors: {result['errors']}", file=sys.stderr)
                  print(f"       Query variables: {variables}", file=sys.stderr)
                  sys.exit(1)
              return result

          # ── Resolve all current assignees to monday user IDs ─────────────
          monday_users = gql("query { users(kind: non_guests) { id name } }").get("data", {}).get("users", [])
          monday_user_by_name = {u["name"]: u["id"] for u in monday_users}

          persons = []
          for login in current_assignees:
              display_name = next(
                  (name for gh, name in USER_MAP.items() if gh.lower() == login.lower()),
                  None
              )
              if not display_name:
                  print(f"  Warning: GitHub login '{login}' not in user map — skipping for Owner")
                  continue
              user_id = monday_user_by_name.get(display_name)
              if not user_id:
                  print(f"  Warning: '{display_name}' not found in monday workspace — skipping for Owner")
                  continue
              persons.append({"id": int(user_id), "kind": "person"})
              print(f"  Matched: '{login}' → '{display_name}' (id={user_id})")

          owner_value = json.dumps({"personsAndTeams": persons})

          ALL_ITEMS_QUERY = """
          query ($boardId: ID!, $linkColId: String!, $cursor: String) {
            boards(ids: [$boardId]) {
              items_page(limit: 100, cursor: $cursor) {
                cursor
                items {
                  id
                  name
                  column_values(ids: [$linkColId]) { text }
                }
              }
            }
          }
          """

          UPDATE_MUTATION = """
          mutation ($itemId: ID!, $boardId: ID!, $colId: String!, $val: JSON!) {
            change_column_value(
              item_id: $itemId board_id: $boardId column_id: $colId value: $val
            ) { id }
          }
          """

          import re

          def find_items_for_url(board_id, link_col, issue_url):
              matched = []
              cursor = None
              while True:
                  variables = {"boardId": board_id, "linkColId": link_col}
                  if cursor:
                      variables["cursor"] = cursor
                  result = gql(ALL_ITEMS_QUERY, variables)
                  page = result.get("data", {}).get("boards", [{}])[0].get("items_page", {})
                  for item in page.get("items", []):
                      col_vals = item.get("column_values", [])
                      link_text = col_vals[0].get("text", "") if col_vals else ""
                      urls = re.findall(r'https?://\S+', link_text)
                      if any(u.rstrip('/').lower() == issue_url.lower() for u in urls):
                          matched.append(item)
                  cursor = page.get("cursor")
                  if not cursor:
                      break
              return matched

          issue_url = ISSUE_URL.rstrip('/')
          updated = 0

          for board_id, link_col, owner_col, label in BOARDS:
              print(f"[{label}] Searching board {board_id} for issue URL...")
              items = find_items_for_url(board_id, link_col, issue_url)
              if not items:
                  print(f"[{label}] No items matched — either the URL hasn't been pasted into the GitHub Issue column, or the column ID is wrong (column ID used: {link_col})")
                  continue
              for item in items:
                  gql(UPDATE_MUTATION, {"itemId": item["id"], "boardId": board_id, "colId": owner_col, "val": owner_value})
                  owners_desc = ", ".join(f"'{p['id']}'" for p in persons) if persons else "cleared"
                  print(f"[{label}] ✓ '{item['name']}' (id={item['id']}) owner → {owners_desc}")
                  updated += 1

          if updated == 0:
              print("Warning: no monday records were updated. Check that issue URLs are correctly pasted into the GitHub Issue link column.")
          else:
              print(f"Done — {updated} owner(s) updated.")
          PYEOF
